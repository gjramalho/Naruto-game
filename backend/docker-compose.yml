services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: naruto_sqlserver
    env_file:
      - .env
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SA_PASSWORD}
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    networks:
      - naruto_network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${SA_PASSWORD}\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
    container_name: naruto_api
    env_file:
      - .env
    environment:
      - ASPNETCORE_URLS=http://+:80
      # ⚠️ AVISO: TrustServerCertificate=True é aceitável apenas para desenvolvimento local
      # Para produção, use certificados SSL válidos e remova TrustServerCertificate
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=NarutoGame;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;MultipleActiveResultSets=true
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=NarutoGameAPI
      - Jwt__Audience=NarutoGame
    ports:
      - "5000:80"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - naruto_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  sql_data:
    driver: local

networks:
  naruto_network:
    driver: bridge
